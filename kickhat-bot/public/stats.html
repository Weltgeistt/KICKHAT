<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanal İstatistikleri | KICKHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #53ff1c;
            --primary-glow: rgba(83, 255, 28, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            animation: fadeIn 1s ease;
        }

        button {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button.active {
            background-color: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .stats-panel {
            background-color: var(--panel-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            animation: fadeInUp 0.8s ease;
        }

        .table-header, .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .table-header {
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border);
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-row:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .rank {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .username {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .msg-count {
            text-align: right;
            font-family: monospace;
            font-size: 1.1rem;
            color: #e2e8f0;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            display: inline-block;
            width: fit-content;
            justify-self: end;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .medal-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .medal-2 { color: #c0c0c0; text-shadow: 0 0 10px rgba(192,192,192,0.5); }
        .medal-3 { color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.5); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="channelTitle">Kanal İstatistikleri</h1>
        <p class="subtitle">En Çok Mesaj Atanlar (Top Chatters)</p>
    </header>

    <div class="controls" id="controls">
        <button data-period="day">Günlük</button>
        <button data-period="week" class="active">Haftalık</button>
        <button data-period="month">Aylık</button>
        <button data-period="year">Yıllık</button>
        <button data-period="all">Tüm Zamanlar</button>
    </div>

    <div class="stats-panel">
        <div class="table-header">
            <div>Sıra</div>
            <div>Kullanıcı</div>
            <div style="text-align: right;">Mesaj Sayısı</div>
        </div>
        <div id="statsList">
            <div class="loading">Veriler yükleniyor...</div>
        </div>
    </div>
</div>

<script>
    // URL'den kanal adını al ?channel=haxi35
    const urlParams = new URLSearchParams(window.location.search);
    const channelSlug = urlParams.get('channel');
    let currentPeriod = 'week';

    if (channelSlug) {
        document.getElementById('channelTitle').innerText = `${channelSlug.toUpperCase()} İstatistikleri`;
    } else {
        document.getElementById('channelTitle').innerText = `Kanal Belirtilmedi!`;
        document.getElementById('statsList').innerHTML = `<div class="loading">Lütfen URL sonuna ?channel=kanaladi ekleyin.</div>`;
    }

    async function fetchStats(period) {
        if (!channelSlug) return;
        
        const listDiv = document.getElementById('statsList');
        listDiv.innerHTML = `<div class="loading">Yükleniyor...</div>`;

        try {
            // API'ye istek at
            const res = await fetch(`/api/stats/${channelSlug}?period=${period}`);
            const data = await res.json();

            listDiv.innerHTML = '';

            if (data.length === 0) {
                listDiv.innerHTML = `<div class="loading">Bu zaman aralığında hiç mesaj bulunamadı.</div>`;
                return;
            }

            data.forEach((user, index) => {
                const rank = index + 1;
                let rankClass = 'rank';
                if (rank === 1) rankClass += ' medal-1';
                else if (rank === 2) rankClass += ' medal-2';
                else if (rank === 3) rankClass += ' medal-3';

                const row = document.createElement('div');
                row.className = 'table-row';
                row.style.animationDelay = `${index * 0.05}s`;
                
                row.innerHTML = `
                    <div class="${rankClass}">#${rank}</div>
                    <div class="username">${user.username}</div>
                    <div class="msg-count">${user.count}</div>
                `;
                listDiv.appendChild(row);
            });

        } catch (e) {
            console.error(e);
            listDiv.innerHTML = `<div class="loading">Veri çekilirken bir hata oluştu!</div>`;
        }
    }

    // Buton Dinleyicileri
    document.querySelectorAll('.controls button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            // Aktif sınıfı güncelle
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            // Veriyi çek
            currentPeriod = e.target.getAttribute('data-period');
            fetchStats(currentPeriod);
        });
    });

    // Sayfa açıldığında ilk veriyi çek
    if (channelSlug) {
        fetchStats(currentPeriod);
    }
</script>

</body>
</html>
