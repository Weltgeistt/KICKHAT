<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Chatters | KICKHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080d14;
            --surface: #0d1520;
            --surface2: #111c2d;
            --border: rgba(255,255,255,0.06);
            --primary: #53ff1c;
            --primary-dim: rgba(83,255,28,0.15);
            --primary-glow: rgba(83,255,28,0.4);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --text: #f0f4ff;
            --muted: #5a6a80;
            --accent: #1a6fff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── ANIMATED BG ─────────────────────── */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(83,255,28,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(83,255,28,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-grid-highlight {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(83,255,28,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(83,255,28,0.15) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(300px circle at var(--x, 50%) var(--y, 50%), black, transparent);
            -webkit-mask-image: radial-gradient(300px circle at var(--x, 50%) var(--y, 50%), black, transparent);
        }
        .bg-glow {
            position: fixed;
            top: -200px; left: 50%; transform: translateX(-50%);
            width: 900px; height: 500px;
            background: radial-gradient(ellipse, rgba(83,255,28,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── LAYOUT ──────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* ── HEADER ──────────────────────────── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: slideDown .6s cubic-bezier(.34,1.56,.64,1) both;
        }
        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            background: var(--primary-dim);
            border: 1px solid rgba(83,255,28,0.25);
            border-radius: 999px;
            padding: .35rem 1rem;
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .logo-badge span { font-size: 1rem; }
        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, #53ff1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: .5rem;
        }
        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* ── STATS CARDS (top 3) ─────────────── */
        .podium {
            display: grid;
            grid-template-columns: 1fr 1.15fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            animation: fadeUp .6s .1s both;
        }
        .podium-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 1.5rem 1rem 1.25rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            background: var(--surface);
            position: relative;
            overflow: hidden;
            transition: transform .3s ease, box-shadow .3s ease;
            cursor: default;
        }
        .podium-card:hover { transform: translateY(-4px); }
        .podium-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .3s;
        }
        .podium-card:hover::before { opacity: 1; }
        .podium-card.rank-1 {
            order: 2;
            background: linear-gradient(160deg, #1a2a10 0%, var(--surface) 60%);
            border-color: rgba(83,252,24,0.4);
            box-shadow: 0 0 40px rgba(83,255,28,0.08);
        }
        .podium-card.rank-1:hover { box-shadow: 0 8px 50px rgba(83,255,28,0.2); }
        .podium-card.rank-2 { order: 1; }
        .podium-card.rank-3 { order: 3; }

        .crown { font-size: 2rem; margin-bottom: .25rem; }
        .podium-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: .75rem;
            position: relative;
        }
        .rank-1 .podium-avatar { background: linear-gradient(135deg, #53ff1c33, #53ff1c66); border: 2px solid var(--primary); color: var(--primary); }
        .rank-2 .podium-avatar { background: rgba(192,192,192,0.15); border: 2px solid #c0c0c0; color: #c0c0c0; }
        .rank-3 .podium-avatar { background: rgba(205,127,50,0.15); border: 2px solid #cd7f32; color: #cd7f32; }

        .podium-name {
            font-weight: 700;
            font-size: .95rem;
            text-align: center;
            margin-bottom: .3rem;
            max-width: 130px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .podium-count {
            font-size: .85rem;
            font-weight: 600;
            color: var(--muted);
        }
        .podium-count strong {
            font-size: 1.1rem;
            font-weight: 800;
        }
        .rank-1 .podium-count strong { color: var(--primary); }
        .rank-2 .podium-count strong { color: #c0c0c0; }
        .rank-3 .podium-count strong { color: #cd7f32; }

        .rank-badge {
            position: absolute;
            top: .75rem; right: .75rem;
            font-size: .7rem;
            font-weight: 800;
            letter-spacing: 1px;
            padding: .2rem .5rem;
            border-radius: 999px;
        }
        .rank-1 .rank-badge { background: var(--primary-dim); color: var(--primary); }
        .rank-2 .rank-badge { background: rgba(192,192,192,0.1); color: #c0c0c0; }
        .rank-3 .rank-badge { background: rgba(205,127,50,0.1); color: #cd7f32; }

        /* ── FILTER TABS ─────────────────────── */
        .filter-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            animation: fadeUp .6s .15s both;
        }
        .filter-tabs {
            display: inline-flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: .3rem;
            gap: .2rem;
        }
        .filter-tabs button {
            background: none;
            border: none;
            padding: .5rem 1.25rem;
            border-radius: 999px;
            font-family: inherit;
            font-size: .9rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all .25s ease;
            white-space: nowrap;
        }
        .filter-tabs button:hover { color: var(--text); }
        .filter-tabs button.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 16px var(--primary-glow);
        }

        /* ── TABLE ───────────────────────────── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
            animation: fadeUp .6s .2s both;
        }
        .table-head {
            display: grid;
            grid-template-columns: 64px 1fr 120px 180px;
            padding: 1rem 1.5rem;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .table-row {
            display: grid;
            grid-template-columns: 64px 1fr 120px 180px;
            padding: .9rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background .2s;
            animation: rowIn .3s ease both;
        }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: rgba(255,255,255,0.025); }

        .col-rank {
            font-weight: 800;
            font-size: 1rem;
        }
        .rank-num { color: var(--muted); }
        .col-user {
            display: flex;
            align-items: center;
            gap: .75rem;
            font-weight: 600;
            font-size: .95rem;
            overflow: hidden;
        }
        .col-user .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: .9rem;
            flex-shrink: 0;
            color: var(--muted);
        }
        .col-user .uname {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .col-count {
            font-family: 'Outfit', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .col-bar { padding-right: .5rem; }
        .bar-track {
            height: 6px;
            background: var(--surface2);
            border-radius: 999px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--primary), #a8ff6e);
            transition: width 1s cubic-bezier(.34,1.56,.64,1);
        }

        /* ── LOADING / EMPTY ─────────────────── */
        .state-msg {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }
        .state-msg .icon { font-size: 2.5rem; margin-bottom: .75rem; }
        .state-msg p { font-size: 1rem; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 1rem;
        }

        /* ── FOOTER ──────────────────────────── */
        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--muted);
            font-size: .8rem;
            animation: fadeUp .6s .4s both;
        }
        footer strong { color: var(--text); }
        footer a { color: var(--muted); text-decoration: none; margin: 0 .5rem; font-weight: 600; }
        footer a:hover { color: var(--text); }
        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: .4rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ── ANIMATIONS ──────────────────────── */
        @keyframes slideDown { from { opacity:0; transform:translateY(-24px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp    { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes rowIn     { from { opacity:0; transform:translateX(-8px);  } to { opacity:1; transform:translateX(0); } }
        @keyframes spin      { to { transform: rotate(360deg); } }
        @keyframes pulse     { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.8);} }

        @media (max-width: 600px) {
            .table-head, .table-row { grid-template-columns: 48px 1fr 80px; }
            .col-bar { display: none; }
            .podium { grid-template-columns: 1fr 1.1fr 1fr; gap: .5rem; }
            .filter-tabs button { padding: .5rem .75rem; font-size: .8rem; }
            .date-range { flex-direction: column; align-items: stretch; }
        }

        /* ── DATE RANGE PICKER ────────────────── */
        .date-range-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            animation: fadeUp .6s .2s both;
        }
        .date-range {
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .6rem 1rem;
            flex-wrap: wrap;
        }
        .date-range label {
            font-size: .8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            white-space: nowrap;
        }
        .date-range input[type="date"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            padding: .45rem .75rem;
            border-radius: .6rem;
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
            color-scheme: dark;
        }
        .date-range input[type="date"]:focus,
        .date-range input[type="date"]:hover {
            border-color: rgba(83,255,28,0.4);
        }
        .date-range .sep {
            color: var(--muted);
            font-size: .9rem;
        }
        .btn-search {
            background: var(--primary);
            color: #000;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            padding: .5rem 1.25rem;
            border-radius: .6rem;
            cursor: pointer;
            transition: box-shadow .2s, opacity .2s;
            white-space: nowrap;
        }
        .btn-search:hover { box-shadow: 0 0 14px var(--primary-glow); }
        .btn-search:active { opacity: .8; }
        .btn-clear {
            background: none;
            color: var(--muted);
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            padding: .45rem .9rem;
            border-radius: .6rem;
            cursor: pointer;
            transition: color .2s, border-color .2s;
        }
        .btn-clear:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
        .range-label {
            display: none;
            background: var(--primary-dim);
            border: 1px solid rgba(83,255,28,0.25);
            color: var(--primary);
            font-size: .78rem;
            font-weight: 700;
            padding: .25rem .75rem;
            border-radius: 999px;
            margin-bottom: .75rem;
            text-align: center;
            animation: fadeUp .3s ease;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-grid-highlight"></div>
<div class="bg-glow"></div>

<div class="page">
    <header>
        <div class="logo-badge"><span>🎩</span> KICKHAT</div>
        <h1 id="channelTitle">Top Chatters</h1>
        <p class="subtitle">Kanalın en aktif üyeleri — gerçek zamanlı güncellenen istatistikler</p>
    </header>

    <!-- Podium: top 3 -->
    <div class="podium" id="podium" style="display:none">
        <div class="podium-card rank-2" id="pod-2">
            <div class="rank-badge">#2</div>
            <div class="podium-avatar" id="pod-2-av">?</div>
            <div class="podium-name" id="pod-2-name">—</div>
            <div class="podium-count"><strong id="pod-2-count">0</strong> mesaj</div>
        </div>
        <div class="podium-card rank-1" id="pod-1">
            <div class="rank-badge">#1</div>
            <div class="crown">👑</div>
            <div class="podium-avatar" id="pod-1-av">?</div>
            <div class="podium-name" id="pod-1-name">—</div>
            <div class="podium-count"><strong id="pod-1-count">0</strong> mesaj</div>
        </div>
        <div class="podium-card rank-3" id="pod-3">
            <div class="rank-badge">#3</div>
            <div class="podium-avatar" id="pod-3-av">?</div>
            <div class="podium-name" id="pod-3-name">—</div>
            <div class="podium-count"><strong id="pod-3-count">0</strong> mesaj</div>
        </div>
    </div>

    <!-- Filter -->
    <div class="filter-wrap">
        <div class="filter-tabs">
            <button data-period="day">Bugün</button>
            <button data-period="week" class="active">Bu Hafta</button>
            <button data-period="month">Bu Ay</button>
            <button data-period="year">Bu Yıl</button>
            <button data-period="all">Tüm Zamanlar</button>
        </div>
    </div>

    <!-- Date Range Picker -->
    <div class="date-range-wrap">
        <div class="date-range">
            <label>📅 Özel Aralık</label>
            <input type="date" id="dateFrom" title="Başlangıç tarihi">
            <span class="sep">→</span>
            <input type="date" id="dateTo" title="Bitiş tarihi">
            <button class="btn-search" id="btnSearch">Ara</button>
            <button class="btn-clear" id="btnClear">Temizle</button>
        </div>
    </div>

    <!-- Active range label -->
    <p class="range-label" id="rangeLabel"></p>

    <!-- Table -->
    <div class="table-wrap">
        <div class="table-head">
            <div>#</div>
            <div>Kullanıcı</div>
            <div>Mesaj</div>
            <div>Oran</div>
        </div>
        <div id="listBody">
            <div class="state-msg">
                <div class="spinner"></div>
                <p>Veriler yükleniyor...</p>
            </div>
        </div>
    </div>

    <footer>
        <span class="live-dot"></span>
        Veriler her 60 saniyede güncellenir &nbsp;·&nbsp; Powered by <strong>KICKHAT</strong>
        <br><br>
        <a id="dashboardLink" href="#">🖥️ Dashboard</a>
        <a id="modlogsLink" href="#">🛡️ Mod Logları</a>
    </footer>
</div>

<script>
const pathParts = window.location.pathname.split('/');
const channel = pathParts[1] && pathParts[1] !== 'public' ? pathParts[1] : (new URLSearchParams(location.search).get('channel') || '');
let period    = 'week';
let refreshTimer;

// Add links
document.getElementById('dashboardLink').href = `/${channel}/dashboard`;
document.getElementById('modlogsLink').href = `/${channel}/modlogs`;

document.addEventListener('mousemove', (e) => {
    document.documentElement.style.setProperty('--x', e.clientX + 'px');
    document.documentElement.style.setProperty('--y', e.clientY + 'px');
});

/* ── Date range state ── */
let customFrom = null;
let customTo   = null;

/* ── Init date inputs with sensible defaults ── */
(function setDefaultDates() {
    const today = new Date();
    const fmt   = d => d.toISOString().split('T')[0];
    const week  = new Date(today); week.setDate(today.getDate() - 7);
    document.getElementById('dateFrom').value = fmt(week);
    document.getElementById('dateTo').value   = fmt(today);
    document.getElementById('dateTo').max     = fmt(today);
})();

if (channel) {
    document.getElementById('channelTitle').textContent = channel.toUpperCase() + ' — Top Chatters';
} else {
    document.getElementById('channelTitle').textContent = 'Kanal Belirtilmedi';
    document.getElementById('listBody').innerHTML = `
        <div class="state-msg">
            <div class="icon">⚠️</div>
            <p>URL sonuna <code>?channel=kanaladi</code> ekleyin</p>
        </div>`;
}

/* ── Fetch & Render ─── */
async function load() {
    if (!channel) return;
    document.getElementById('listBody').innerHTML = `
        <div class="state-msg"><div class="spinner"></div><p>Yüklüyor...</p></div>`;
    document.getElementById('podium').style.display = 'none';

    try {
        let url;
        if (customFrom && customTo) {
            const toPlus = new Date(customTo);
            toPlus.setDate(toPlus.getDate() + 1);
            url = `/api/stats/${channel}?from=${customFrom}&to=${toPlus.toISOString().split('T')[0]}`;
        } else {
            url = `/api/stats/${channel}?period=${period}`;
        }
        const r    = await fetch(url);
        const data = await r.json();
        render(data);
    } catch (e) {
        document.getElementById('listBody').innerHTML = `
            <div class="state-msg"><div class="icon">❌</div><p>Sunucuya ulaşılamadı</p></div>`;
    }
}

function render(data) {
    if (!data.length) {
        document.getElementById('listBody').innerHTML = `
            <div class="state-msg"><div class="icon">💭</div>
            <p>Bu dönemde hiç mesaj bulunamadı</p></div>`;
        return;
    }

    const top   = data[0];
    const max   = parseInt(top.count);

    /* Podium */
    const pod = document.getElementById('podium');
    [1,2,3].forEach(n => {
        const u = data[n-1];
        if (!u) return;
        document.getElementById(`pod-${n}-av`).textContent   = u.username[0].toUpperCase();
        document.getElementById(`pod-${n}-name`).textContent  = u.username;
        document.getElementById(`pod-${n}-count`).textContent = Number(u.count).toLocaleString('tr-TR');
    });
    pod.style.display = data.length >= 3 ? 'grid' : 'none';

    /* Table (from 4th row onwards, or all if < 4) */
    const rows = data.slice(data.length >= 4 ? 3 : 0);
    const startRank = data.length >= 4 ? 4 : 1;
    const html = rows.map((u, i) => {
        const rank  = startRank + i;
        const pct   = Math.round((parseInt(u.count) / max) * 100);
        const delay = (i * 35);
        return `
        <div class="table-row" style="animation-delay:${delay}ms">
            <div class="col-rank"><span class="rank-num">#${rank}</span></div>
            <div class="col-user">
                <div class="avatar">${u.username[0].toUpperCase()}</div>
                <span class="uname">${escHtml(u.username)}</span>
            </div>
            <div class="col-count">${Number(u.count).toLocaleString('tr-TR')}</div>
            <div class="col-bar">
                <div class="bar-track">
                    <div class="bar-fill" style="width:0%" data-pct="${pct}"></div>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('listBody').innerHTML = html;

    /* Animate bars after paint */
    requestAnimationFrame(() => {
        document.querySelectorAll('.bar-fill').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Period filter buttons ── */
document.querySelectorAll('.filter-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
        customFrom = null;
        customTo   = null;
        updateRangeLabel();

        document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        period = btn.dataset.period;
        clearInterval(refreshTimer);
        load();
        refreshTimer = setInterval(load, 60000);
    });
});

/* ── Date Range: Ara butonu ── */
document.getElementById('btnSearch').addEventListener('click', () => {
    const from = document.getElementById('dateFrom').value;
    const to   = document.getElementById('dateTo').value;
    if (!from || !to) { alert('Lütfen başlangıç ve bitiş tarihini seçin.'); return; }
    if (from > to)    { alert('Başlangıç tarihi bitiş tarihinden büyük olamaz.'); return; }

    customFrom = from;
    customTo   = to;

    document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
    updateRangeLabel();
    clearInterval(refreshTimer);
    load();
});

/* ── Temizle butonu ── */
document.getElementById('btnClear').addEventListener('click', () => {
    customFrom = null;
    customTo   = null;
    updateRangeLabel();

    const weekBtn = document.querySelector('[data-period="week"]');
    weekBtn.classList.add('active');
    period = 'week';
    clearInterval(refreshTimer);
    load();
    refreshTimer = setInterval(load, 3000);
});

function updateRangeLabel() {
    const lbl = document.getElementById('rangeLabel');
    if (customFrom && customTo) {
        const fmt = s => new Date(s + 'T12:00:00').toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
        lbl.textContent = `📅 ${fmt(customFrom)} – ${fmt(customTo)}`;
        lbl.style.display = 'block';
    } else {
        lbl.style.display = 'none';
    }
}

/* ── Init ── */
document.addEventListener('mousemove', e => {
    document.documentElement.style.setProperty('--x', e.clientX + 'px');
    document.documentElement.style.setProperty('--y', e.clientY + 'px');
});

if (channel) {
    load();
    refreshTimer = setInterval(load, 3000);
}
</script>
</body>
</html>
